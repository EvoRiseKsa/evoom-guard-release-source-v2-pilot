name: EvoGuard Admit Release Source

on:
  workflow_run: # zizmor: ignore[dangerous-triggers] reviewed B/C chain; C authenticates canonical controls before Environment access
    workflows: ["EvoGuard Produce Release Source Receipt"]
    types: [completed]

permissions: {}

concurrency:
  group: evoguard-release-source-v2-${{ github.event.workflow_run.id }}-${{ github.event.workflow_run.run_attempt }}
  cancel-in-progress: false

jobs:
  preflight:
    if: vars.EVOGUARD_RELEASE_SOURCE_V2_ENABLED == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    outputs:
      target_sha: ${{ steps.trigger.outputs.target_sha }}
      producer_run_id: ${{ steps.trigger.outputs.producer_run_id }}
      producer_run_attempt: ${{ steps.trigger.outputs.producer_run_attempt }}
      producer_workflow_id: ${{ steps.trigger.outputs.producer_workflow_id }}
      repository_id: ${{ steps.trigger.outputs.repository_id }}
    steps:
      - id: trigger
        name: Validate B before requesting protected Environment access
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EXPECTED_RECEIPT_WORKFLOW_ID: ${{ vars.EVOGUARD_RELEASE_SOURCE_RECEIPT_WORKFLOW_ID }}
          EXPECTED_ADMIT_WORKFLOW_ID: ${{ vars.EVOGUARD_RELEASE_SOURCE_ADMIT_WORKFLOW_ID }}
        with:
          script: |
            const run = context.payload.workflow_run;
            const expected = process.env.EXPECTED_RECEIPT_WORKFLOW_ID || '';
            const expectedAdmit = process.env.EXPECTED_ADMIT_WORKFLOW_ID || '';
            if (!/^[1-9][0-9]*$/.test(expected) || !/^[1-9][0-9]*$/.test(expectedAdmit) ||
                String(run.workflow_id) !== expected ||
                run.path !== '.github/workflows/evoguard-produce-release-source-receipt.yml' ||
                run.event !== 'workflow_run' || run.status !== 'completed' || run.conclusion !== 'success' ||
                run.head_branch !== 'main' || run.head_repository?.full_name !== context.payload.repository.full_name ||
                !/^[0-9a-f]{40,64}$/.test(run.head_sha)) {
              throw new Error('trigger is not the configured successful B producer run');
            }
            const { owner, repo } = context.repo;
            const current = (await github.rest.repos.getBranch({ owner, repo, branch: 'main' })).data.commit.sha;
            if (current !== run.head_sha || context.sha !== run.head_sha) {
              throw new Error('protected main moved after B; no Environment or key access is allowed');
            }
            const admit = (await github.rest.actions.getWorkflow({
              owner, repo, workflow_id: '.github/workflows/evoguard-admit-release-source.yml',
            })).data;
            if (String(admit.id) !== expectedAdmit ||
                admit.path !== '.github/workflows/evoguard-admit-release-source.yml' ||
                admit.state !== 'active' || String(admit.id) === String(run.workflow_id)) {
              throw new Error('current C workflow ID/path/state is not the configured distinct admitter');
            }
            core.setOutput('target_sha', run.head_sha);
            core.setOutput('producer_run_id', String(run.id));
            core.setOutput('producer_run_attempt', String(run.run_attempt));
            core.setOutput('producer_workflow_id', String(run.workflow_id));
            core.setOutput('repository_id', String(context.payload.repository.id));

      - name: Bind current C runtime SHA before Environment access
        env:
          TARGET_SHA: ${{ steps.trigger.outputs.target_sha }}
        run: |
          set -euo pipefail
          test "$GITHUB_SHA" = "$TARGET_SHA"
          test "$GITHUB_WORKFLOW_SHA" = "$TARGET_SHA"
          test "$GITHUB_SHA" = "$GITHUB_WORKFLOW_SHA"
          test "$RUNNER_ENVIRONMENT" = "github-hosted"

      - name: Download exact B inputs before Environment access
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: evoguard-release-source-producer-receipt-v2-${{ steps.trigger.outputs.producer_run_attempt }}
          path: ${{ runner.temp }}/b-inputs-download
          run-id: ${{ steps.trigger.outputs.producer_run_id }}
          github-token: ${{ github.token }}

      - name: Create canonical external controls before Environment access
        env:
          DOWNLOAD: ${{ runner.temp }}/b-inputs-download
          CONTROLS: ${{ runner.temp }}/external-controls
          TARGET_SHA: ${{ steps.trigger.outputs.target_sha }}
          REPOSITORY_ID: ${{ steps.trigger.outputs.repository_id }}
          PRODUCER_RUN_ID: ${{ steps.trigger.outputs.producer_run_id }}
          PRODUCER_RUN_ATTEMPT: ${{ steps.trigger.outputs.producer_run_attempt }}
          PRODUCER_WORKFLOW_ID: ${{ steps.trigger.outputs.producer_workflow_id }}
          REVERIFY_WORKFLOW_ID: ${{ vars.EVOGUARD_RELEASE_SOURCE_REVERIFY_WORKFLOW_ID }}
          ADMIT_WORKFLOW_ID: ${{ vars.EVOGUARD_RELEASE_SOURCE_ADMIT_WORKFLOW_ID }}
          REVERIFY_BLOB: ${{ vars.EVOGUARD_RELEASE_SOURCE_REVERIFY_WORKFLOW_BLOB_SHA }}
          RECEIPT_BLOB: ${{ vars.EVOGUARD_RELEASE_SOURCE_RECEIPT_WORKFLOW_BLOB_SHA }}
          ADMIT_BLOB: ${{ vars.EVOGUARD_RELEASE_SOURCE_ADMIT_WORKFLOW_BLOB_SHA }}
          EXPECTED_GIT_SHA256: ${{ vars.EVOGUARD_GIT_EXECUTABLE_SHA256 }}
          EXPECTED_GH_SHA256: ${{ vars.EVOGUARD_GH_EXECUTABLE_SHA256 }}
          PROVIDER_UID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_UID }}
          PROVIDER_GID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_GID }}
          V2_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_RELEASE_SOURCE_ADMISSION_V2_PUBLIC_KEY_B64 }}
          FINALIZER_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_TRUSTED_FINALIZER_PUBLIC_KEY_B64 }}
          ARTIFACT_V1_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_ARTIFACT_ADMISSION_V1_PUBLIC_KEY_B64 }}
          ARTIFACT_V2_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_ARTIFACT_DIGEST_ADMISSION_V2_PUBLIC_KEY_B64 }}
          SOURCE_V1_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_RELEASE_SOURCE_FINALIZER_V1_PUBLIC_KEY_B64 }}
        run: |
          set -euo pipefail
          for value in "$REVERIFY_BLOB" "$RECEIPT_BLOB" "$ADMIT_BLOB"; do [[ "$value" =~ ^[0-9a-f]{40,64}$ ]]; done
          for value in "$EXPECTED_GIT_SHA256" "$EXPECTED_GH_SHA256"; do [[ "$value" =~ ^[0-9a-f]{64}$ ]]; done
          for value in "$REPOSITORY_ID" "$PRODUCER_RUN_ID" "$PRODUCER_RUN_ATTEMPT" "$PRODUCER_WORKFLOW_ID" "$REVERIFY_WORKFLOW_ID" "$ADMIT_WORKFLOW_ID" "$PROVIDER_UID" "$PROVIDER_GID"; do [[ "$value" =~ ^[1-9][0-9]*$ ]]; done
          test "$PROVIDER_UID" -ne 65534
          test "$PROVIDER_GID" -ne 65534

          git_executable="$(readlink -f "$(command -v git)")"
          gh_executable="$(readlink -f "$(command -v gh)")"
          test -f "$git_executable" -a ! -L "$git_executable"
          test -f "$gh_executable" -a ! -L "$gh_executable"
          printf '%s  %s\n' "$EXPECTED_GIT_SHA256" "$git_executable" | sha256sum --check
          printf '%s  %s\n' "$EXPECTED_GH_SHA256" "$gh_executable" | sha256sum --check

          objects="$RUNNER_TEMP/preflight-objects.git"
          git init --bare "$objects"
          git -C "$objects" remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
          GIT_TERMINAL_PROMPT=0 git -C "$objects" fetch --quiet --no-tags origin "+refs/heads/main:refs/heads/main"
          test "$(git -C "$objects" rev-parse refs/heads/main)" = "$TARGET_SHA"
          test "$(git -C "$objects" rev-parse "$TARGET_SHA:.github/workflows/evoguard-release-source-reverify.yml")" = "$REVERIFY_BLOB"
          test "$(git -C "$objects" rev-parse "$TARGET_SHA:.github/workflows/evoguard-produce-release-source-receipt.yml")" = "$RECEIPT_BLOB"
          test "$(git -C "$objects" rev-parse "$TARGET_SHA:.github/workflows/evoguard-admit-release-source.yml")" = "$ADMIT_BLOB"

          python - "$DOWNLOAD" "$CONTROLS" <<'PY'
          import os, stat, sys

          source, destination = map(os.path.abspath, sys.argv[1:])
          expected = {
              'source.json': 128 * 1024, 'context.json': 256 * 1024,
              'verdict.json': 8 * 1024 * 1024, 'handoff.json': 512 * 1024,
              'producer.json': 128 * 1024, 'producer-receipt.json': 512 * 1024,
          }
          root = os.lstat(source)
          if stat.S_ISLNK(root.st_mode) or not stat.S_ISDIR(root.st_mode) or set(os.listdir(source)) != set(expected):
              raise SystemExit('B input artifact root/file set is unsafe')
          os.mkdir(destination, 0o700)
          flags = os.O_RDONLY | getattr(os, 'O_NOFOLLOW', 0)
          for name, maximum in expected.items():
              path = os.path.join(source, name)
              before = os.lstat(path)
              if stat.S_ISLNK(before.st_mode) or not stat.S_ISREG(before.st_mode) or not 1 <= before.st_size <= maximum:
                  raise SystemExit(f'unsafe B input: {name}')
              descriptor = os.open(path, flags)
              try:
                  opened = os.fstat(descriptor)
                  if (opened.st_dev, opened.st_ino) != (before.st_dev, before.st_ino):
                      raise SystemExit(f'B input changed while opening: {name}')
                  destination_path = os.path.join(destination, name)
                  output = os.open(destination_path, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
                  try:
                      while True:
                          block = os.read(descriptor, 1024 * 1024)
                          if not block:
                              break
                          os.write(output, block)
                      os.fsync(output)
                  finally:
                      os.close(output)
                  after = os.fstat(descriptor)
                  if (after.st_dev, after.st_ino, after.st_size, after.st_mtime_ns) != (opened.st_dev, opened.st_ino, opened.st_size, opened.st_mtime_ns):
                      raise SystemExit(f'B input changed while copying: {name}')
              finally:
                  os.close(descriptor)
          PY
          git -C "$objects" show "$TARGET_SHA:security/signing-requirements.lock" > "$CONTROLS/signing-requirements.lock"
          test -s "$CONTROLS/signing-requirements.lock"

          key_dir="$RUNNER_TEMP/preflight-public-roots"
          mkdir -m 0700 "$key_dir"
          decode_public() { test -n "$1"; printf '%s' "$1" | base64 --decode > "$2"; }
          decode_public "$V2_PUBLIC_KEY_B64" "$key_dir/release_source_admission_v2.pem"
          decode_public "$FINALIZER_PUBLIC_KEY_B64" "$key_dir/trusted_finalizer.pem"
          decode_public "$ARTIFACT_V1_PUBLIC_KEY_B64" "$key_dir/artifact_admission_v1.pem"
          decode_public "$ARTIFACT_V2_PUBLIC_KEY_B64" "$key_dir/artifact_digest_admission_v2.pem"
          decode_public "$SOURCE_V1_PUBLIC_KEY_B64" "$key_dir/release_source_finalizer_v1.pem"
          : > "$RUNNER_TEMP/public-key-ids.txt"
          for domain in release_source_admission_v2 trusted_finalizer artifact_admission_v1 artifact_digest_admission_v2 release_source_finalizer_v1; do
            openssl pkey -pubin -in "$key_dir/$domain.pem" -outform DER -out "$key_dir/$domain.der"
            printf '%s sha256:%s\n' "$domain" "$(sha256sum "$key_dir/$domain.der" | cut -d' ' -f1)" >> "$RUNNER_TEMP/public-key-ids.txt"
          done
          test "$(cut -d' ' -f2 "$RUNNER_TEMP/public-key-ids.txt" | sort -u | wc -l)" -eq 5

          python - "$CONTROLS" "$RUNNER_TEMP/public-key-ids.txt" <<'PY'
          import hashlib, json, os, re, sys
          from pathlib import Path

          controls = Path(sys.argv[1])
          producer = json.loads((controls / 'producer.json').read_text(encoding='utf-8'))
          source_control = json.loads((controls / 'source.json').read_text(encoding='utf-8'))
          expected_source = {
              'repository': os.environ['GITHUB_REPOSITORY'],
              'repository_id': os.environ['REPOSITORY_ID'],
              'default_branch': 'main', 'protected_ref': 'refs/heads/main',
              'target_commit_sha': os.environ['TARGET_SHA'],
          }
          if any(source_control.get(name) != value for name, value in expected_source.items()):
              raise SystemExit('source control does not match protected repository/main event')
          expected = {
              'workflow_repository': os.environ['GITHUB_REPOSITORY'],
              'workflow_repository_id': os.environ['REPOSITORY_ID'],
              'workflow_id': os.environ['PRODUCER_WORKFLOW_ID'],
              'workflow_path': '.github/workflows/evoguard-produce-release-source-receipt.yml',
              'workflow_blob_sha': os.environ['RECEIPT_BLOB'],
              'workflow_run_id': os.environ['PRODUCER_RUN_ID'],
              'workflow_run_attempt': int(os.environ['PRODUCER_RUN_ATTEMPT']),
              'workflow_event': 'workflow_run', 'workflow_ref': 'refs/heads/main',
              'workflow_commit_sha': os.environ['TARGET_SHA'],
              'trigger_workflow_id': os.environ['REVERIFY_WORKFLOW_ID'],
              'trigger_workflow_path': '.github/workflows/evoguard-release-source-reverify.yml',
              'trigger_workflow_blob_sha': os.environ['REVERIFY_BLOB'],
              'trigger_workflow_run_id': source_control.get('workflow_run_id'),
              'trigger_workflow_run_attempt': source_control.get('workflow_run_attempt'),
              'runner_class': 'github-hosted',
          }
          if any(producer.get(name) != value for name, value in expected.items()):
              raise SystemExit('B producer identity does not match event/settings/raw Git')
          admitter = {
              'workflow_repository': os.environ['GITHUB_REPOSITORY'],
              'workflow_repository_id': os.environ['REPOSITORY_ID'],
              'workflow_id': os.environ['ADMIT_WORKFLOW_ID'],
              'workflow_path': '.github/workflows/evoguard-admit-release-source.yml',
              'workflow_blob_sha': os.environ['ADMIT_BLOB'],
              'workflow_run_id': os.environ['GITHUB_RUN_ID'],
              'workflow_run_attempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'workflow_event': 'workflow_run', 'workflow_ref': 'refs/heads/main',
              'workflow_commit_sha': os.environ['TARGET_SHA'],
              'trigger_workflow_id': producer['workflow_id'],
              'trigger_workflow_path': producer['workflow_path'],
              'trigger_workflow_blob_sha': producer['workflow_blob_sha'],
              'trigger_workflow_run_id': producer['workflow_run_id'],
              'trigger_workflow_run_attempt': producer['workflow_run_attempt'],
              'runner_class': 'github-hosted',
          }
          policy = {
              'repository': os.environ['GITHUB_REPOSITORY'],
              'signer_workflow': f"{os.environ['GITHUB_REPOSITORY']}/.github/workflows/evoguard-produce-release-source-receipt.yml",
              'signer_digest': os.environ['TARGET_SHA'], 'source_ref': 'refs/heads/main',
              'source_digest': os.environ['TARGET_SHA'],
              'cert_oidc_issuer': 'https://token.actions.githubusercontent.com',
          }
          for name, value in (('admitter.json', admitter), ('github-policy.json', policy)):
              (controls / name).write_text(json.dumps(value, sort_keys=True, separators=(',', ':')) + '\n', encoding='utf-8', newline='\n')
          key_ids = dict(line.strip().split(' ', 1) for line in Path(sys.argv[2]).read_text(encoding='utf-8').splitlines())
          materials = {}
          for path in sorted(controls.iterdir()):
              if path.name == 'control-manifest.json':
                  continue
              if not path.is_file():
                  raise SystemExit('external controls contain a non-file entry')
              data = path.read_bytes()
              materials[path.name] = {'sha256': hashlib.sha256(data).hexdigest(), 'size': len(data)}
          manifest = {
              'format': 'EVOGUARD_RELEASE_SOURCE_V2_EXTERNAL_CONTROLS_V1',
              'repository': os.environ['GITHUB_REPOSITORY'], 'repository_id': os.environ['REPOSITORY_ID'],
              'target_sha': os.environ['TARGET_SHA'],
              'workflows': {
                  'A': {'id': os.environ['REVERIFY_WORKFLOW_ID'], 'blob': os.environ['REVERIFY_BLOB']},
                  'B': {'id': os.environ['PRODUCER_WORKFLOW_ID'], 'blob': os.environ['RECEIPT_BLOB'], 'run_id': os.environ['PRODUCER_RUN_ID'], 'run_attempt': int(os.environ['PRODUCER_RUN_ATTEMPT'])},
                  'C': {'id': os.environ['ADMIT_WORKFLOW_ID'], 'blob': os.environ['ADMIT_BLOB'], 'run_id': os.environ['GITHUB_RUN_ID'], 'run_attempt': int(os.environ['GITHUB_RUN_ATTEMPT'])},
              },
              'toolchain': {'git_sha256': os.environ['EXPECTED_GIT_SHA256'], 'gh_sha256': os.environ['EXPECTED_GH_SHA256'], 'provider_uid': int(os.environ['PROVIDER_UID']), 'provider_gid': int(os.environ['PROVIDER_GID'])},
              'public_key_ids': key_ids, 'materials': materials,
          }
          (controls / 'control-manifest.json').write_text(json.dumps(manifest, sort_keys=True, separators=(',', ':')) + '\n', encoding='utf-8', newline='\n')
          PY

      - name: Upload canonical external controls for protected C and detached D
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evoguard-release-source-v2-controls-${{ github.run_attempt }}
          path: ${{ runner.temp }}/external-controls
          if-no-files-found: error
          overwrite: false
          include-hidden-files: false
          retention-days: 30

  seal:
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: evoguard-release-source-v2
    permissions:
      actions: read
      attestations: read
      contents: read
    steps:
      - name: Set up the protected Python runtime
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Download pre-Environment canonical external controls
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: evoguard-release-source-v2-controls-${{ github.run_attempt }}
          path: ${{ runner.temp }}/external-controls-download

      - name: Snapshot and verify canonical external controls
        env:
          INPUTS: ${{ runner.temp }}/external-controls-download
          SNAPSHOT: ${{ runner.temp }}/external-controls-safe
        run: |
          set -euo pipefail
          python - "$INPUTS" "$SNAPSHOT" <<'PY'
          import os, stat, sys

          source, destination = map(os.path.abspath, sys.argv[1:])
          expected = {
              'source.json': 128 * 1024,
              'context.json': 256 * 1024,
              'verdict.json': 8 * 1024 * 1024,
              'handoff.json': 512 * 1024,
              'producer.json': 128 * 1024,
              'producer-receipt.json': 512 * 1024,
              'admitter.json': 128 * 1024,
              'github-policy.json': 128 * 1024,
              'signing-requirements.lock': 64 * 1024,
              'control-manifest.json': 256 * 1024,
          }
          metadata = os.lstat(source)
          if stat.S_ISLNK(metadata.st_mode) or not stat.S_ISDIR(metadata.st_mode):
              raise SystemExit('downloaded B artifact root must be a real directory')
          if set(os.listdir(source)) != set(expected):
              raise SystemExit('downloaded B artifact has an unexpected file set')
          os.mkdir(destination, 0o700)
          flags = os.O_RDONLY | getattr(os, 'O_NOFOLLOW', 0)
          for name, maximum in expected.items():
              path = os.path.join(source, name)
              before = os.lstat(path)
              if stat.S_ISLNK(before.st_mode) or not stat.S_ISREG(before.st_mode):
                  raise SystemExit(f'{name} must be a regular non-symlink file')
              if before.st_size < 1 or before.st_size > maximum:
                  raise SystemExit(f'{name} is outside its bounded size')
              descriptor = os.open(path, flags)
              try:
                  opened = os.fstat(descriptor)
                  if not stat.S_ISREG(opened.st_mode) or (opened.st_dev, opened.st_ino) != (before.st_dev, before.st_ino):
                      raise SystemExit(f'{name} changed while it was opened')
                  target = os.path.join(destination, name)
                  output = os.open(target, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
                  try:
                      with os.fdopen(descriptor, 'rb', closefd=False) as reader, os.fdopen(output, 'wb', closefd=False) as writer:
                          while True:
                              chunk = reader.read(1024 * 1024)
                              if not chunk:
                                  break
                              writer.write(chunk)
                          writer.flush()
                          os.fsync(writer.fileno())
                  finally:
                      os.close(output)
                  after = os.fstat(descriptor)
                  if (after.st_dev, after.st_ino, after.st_size, after.st_mtime_ns) != (opened.st_dev, opened.st_ino, opened.st_size, opened.st_mtime_ns):
                      raise SystemExit(f'{name} changed while it was copied')
              finally:
                  os.close(descriptor)
          import hashlib, json
          with open(os.path.join(destination, 'control-manifest.json'), encoding='utf-8') as handle:
              manifest = json.load(handle)
          if manifest.get('format') != 'EVOGUARD_RELEASE_SOURCE_V2_EXTERNAL_CONTROLS_V1':
              raise SystemExit('unsupported external-controls manifest')
          materials = manifest.get('materials')
          if not isinstance(materials, dict) or set(materials) != set(expected) - {'control-manifest.json'}:
              raise SystemExit('external-controls material set is not canonical')
          for name, descriptor in materials.items():
              data = open(os.path.join(destination, name), 'rb').read()
              if descriptor != {'sha256': hashlib.sha256(data).hexdigest(), 'size': len(data)}:
                  raise SystemExit(f'external-controls material mismatch: {name}')
          PY

      - name: Install hash-locked Ed25519 dependencies from external controls
        run: >-
          python -m pip install --disable-pip-version-check --only-binary=:all:
          --require-hashes -r "$RUNNER_TEMP/external-controls-safe/signing-requirements.lock"

      - name: Download and pin the V2-capable prior Guard runtime
        env:
          BOOTSTRAP_URL: ${{ vars.EVOGUARD_BOOTSTRAP_RUNTIME_URL }}
          BOOTSTRAP_SHA256: ${{ vars.EVOGUARD_BOOTSTRAP_RUNTIME_SHA256 }}
        run: |
          set -euo pipefail
          test -n "$BOOTSTRAP_URL"
          [[ "$BOOTSTRAP_SHA256" =~ ^[0-9a-f]{64}$ ]]
          curl --fail --location --proto '=https' --tlsv1.2 --output "$RUNNER_TEMP/evo-guard.pyz" "$BOOTSTRAP_URL"
          printf '%s  %s\n' "$BOOTSTRAP_SHA256" "$RUNNER_TEMP/evo-guard.pyz" | sha256sum --check
          chmod 0755 "$RUNNER_TEMP/evo-guard.pyz"

      - name: Bind raw Git, A/B/C identities, provider policy, and executable pins
        env:
          INPUTS: ${{ runner.temp }}/external-controls-safe
          TARGET_SHA: ${{ needs.preflight.outputs.target_sha }}
          REPOSITORY_ID: ${{ needs.preflight.outputs.repository_id }}
          PRODUCER_RUN_ID: ${{ needs.preflight.outputs.producer_run_id }}
          PRODUCER_RUN_ATTEMPT: ${{ needs.preflight.outputs.producer_run_attempt }}
          PRODUCER_WORKFLOW_ID: ${{ needs.preflight.outputs.producer_workflow_id }}
          REVERIFY_WORKFLOW_ID: ${{ vars.EVOGUARD_RELEASE_SOURCE_REVERIFY_WORKFLOW_ID }}
          ADMIT_WORKFLOW_ID: ${{ vars.EVOGUARD_RELEASE_SOURCE_ADMIT_WORKFLOW_ID }}
          REVERIFY_BLOB: ${{ vars.EVOGUARD_RELEASE_SOURCE_REVERIFY_WORKFLOW_BLOB_SHA }}
          RECEIPT_BLOB: ${{ vars.EVOGUARD_RELEASE_SOURCE_RECEIPT_WORKFLOW_BLOB_SHA }}
          ADMIT_BLOB: ${{ vars.EVOGUARD_RELEASE_SOURCE_ADMIT_WORKFLOW_BLOB_SHA }}
          EXPECTED_GIT_SHA256: ${{ vars.EVOGUARD_GIT_EXECUTABLE_SHA256 }}
          EXPECTED_GH_SHA256: ${{ vars.EVOGUARD_GH_EXECUTABLE_SHA256 }}
          PROVIDER_UID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_UID }}
          PROVIDER_GID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_GID }}
        run: |
          set -euo pipefail
          for value in "$REVERIFY_BLOB" "$RECEIPT_BLOB" "$ADMIT_BLOB"; do [[ "$value" =~ ^[0-9a-f]{40,64}$ ]]; done
          for value in "$EXPECTED_GIT_SHA256" "$EXPECTED_GH_SHA256"; do [[ "$value" =~ ^[0-9a-f]{64}$ ]]; done
          for value in "$REPOSITORY_ID" "$PRODUCER_RUN_ID" "$PRODUCER_RUN_ATTEMPT" "$PRODUCER_WORKFLOW_ID" "$REVERIFY_WORKFLOW_ID" "$ADMIT_WORKFLOW_ID" "$PROVIDER_UID" "$PROVIDER_GID"; do [[ "$value" =~ ^[1-9][0-9]*$ ]]; done
          test "$GITHUB_SHA" = "$TARGET_SHA"
          test "$GITHUB_WORKFLOW_SHA" = "$TARGET_SHA"
          test "$RUNNER_ENVIRONMENT" = "github-hosted"

          python - "$INPUTS/control-manifest.json" <<'PY'
          import json, os, sys
          with open(sys.argv[1], encoding='utf-8') as source:
              manifest = json.load(source)
          expected_workflows = {
              'A': {'id': os.environ['REVERIFY_WORKFLOW_ID'], 'blob': os.environ['REVERIFY_BLOB']},
              'B': {'id': os.environ['PRODUCER_WORKFLOW_ID'], 'blob': os.environ['RECEIPT_BLOB'], 'run_id': os.environ['PRODUCER_RUN_ID'], 'run_attempt': int(os.environ['PRODUCER_RUN_ATTEMPT'])},
              'C': {'id': os.environ['ADMIT_WORKFLOW_ID'], 'blob': os.environ['ADMIT_BLOB'], 'run_id': os.environ['GITHUB_RUN_ID'], 'run_attempt': int(os.environ['GITHUB_RUN_ATTEMPT'])},
          }
          expected_toolchain = {
              'git_sha256': os.environ['EXPECTED_GIT_SHA256'], 'gh_sha256': os.environ['EXPECTED_GH_SHA256'],
              'provider_uid': int(os.environ['PROVIDER_UID']), 'provider_gid': int(os.environ['PROVIDER_GID']),
          }
          if (manifest.get('repository') != os.environ['GITHUB_REPOSITORY'] or
              manifest.get('repository_id') != os.environ['REPOSITORY_ID'] or
              manifest.get('target_sha') != os.environ['TARGET_SHA'] or
              manifest.get('workflows') != expected_workflows or
              manifest.get('toolchain') != expected_toolchain):
              raise SystemExit('external-controls manifest does not match protected C settings/runtime')
          PY

          git_executable="$(readlink -f "$(command -v git)")"
          gh_executable="$(readlink -f "$(command -v gh)")"
          test -f "$git_executable" -a ! -L "$git_executable"
          test -f "$gh_executable" -a ! -L "$gh_executable"
          printf '%s  %s\n' "$EXPECTED_GIT_SHA256" "$git_executable" | sha256sum --check
          printf '%s  %s\n' "$EXPECTED_GH_SHA256" "$gh_executable" | sha256sum --check
          printf '%s\n' "$git_executable" > "$RUNNER_TEMP/git-executable.path"
          printf '%s\n' "$gh_executable" > "$RUNNER_TEMP/gh-executable.path"

          objects="$RUNNER_TEMP/objects.git"
          git init --bare "$objects"
          git -C "$objects" remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
          GIT_TERMINAL_PROMPT=0 git -C "$objects" fetch --quiet --no-tags origin "+refs/heads/main:refs/heads/main"
          test "$(git -C "$objects" rev-parse refs/heads/main)" = "$TARGET_SHA"
          test "$(git -C "$objects" rev-parse "$TARGET_SHA:.github/workflows/evoguard-release-source-reverify.yml")" = "$REVERIFY_BLOB"
          test "$(git -C "$objects" rev-parse "$TARGET_SHA:.github/workflows/evoguard-produce-release-source-receipt.yml")" = "$RECEIPT_BLOB"
          test "$(git -C "$objects" rev-parse "$TARGET_SHA:.github/workflows/evoguard-admit-release-source.yml")" = "$ADMIT_BLOB"

          python - "$INPUTS/producer.json" "$RUNNER_TEMP/admitter.json" "$RUNNER_TEMP/github-policy.json" <<'PY'
          import json, os, re, sys

          producer_path, admitter_path, policy_path = sys.argv[1:]
          with open(producer_path, encoding='utf-8') as source:
              producer = json.load(source)
          required_numbers = {
              'REPOSITORY_ID', 'PRODUCER_RUN_ID', 'PRODUCER_RUN_ATTEMPT',
              'PRODUCER_WORKFLOW_ID', 'ADMIT_WORKFLOW_ID', 'GITHUB_RUN_ID', 'GITHUB_RUN_ATTEMPT',
          }
          for name in required_numbers:
              if re.fullmatch(r'[1-9][0-9]*', os.environ[name]) is None:
                  raise SystemExit(f'invalid {name}')
          expected = {
              'workflow_repository': os.environ['GITHUB_REPOSITORY'],
              'workflow_repository_id': os.environ['REPOSITORY_ID'],
              'workflow_id': os.environ['PRODUCER_WORKFLOW_ID'],
              'workflow_run_id': os.environ['PRODUCER_RUN_ID'],
              'workflow_run_attempt': int(os.environ['PRODUCER_RUN_ATTEMPT']),
              'workflow_path': '.github/workflows/evoguard-produce-release-source-receipt.yml',
              'workflow_blob_sha': os.environ['RECEIPT_BLOB'],
              'workflow_commit_sha': os.environ['TARGET_SHA'],
          }
          if any(producer.get(key) != value for key, value in expected.items()):
              raise SystemExit('producer artifact does not match the protected B event and raw Git')
          admitter = {
              'workflow_repository': os.environ['GITHUB_REPOSITORY'],
              'workflow_repository_id': os.environ['REPOSITORY_ID'],
              'workflow_id': os.environ['ADMIT_WORKFLOW_ID'],
              'workflow_path': '.github/workflows/evoguard-admit-release-source.yml',
              'workflow_blob_sha': os.environ['ADMIT_BLOB'],
              'workflow_run_id': os.environ['GITHUB_RUN_ID'],
              'workflow_run_attempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'workflow_event': 'workflow_run',
              'workflow_ref': 'refs/heads/main',
              'workflow_commit_sha': os.environ['TARGET_SHA'],
              'trigger_workflow_id': producer['workflow_id'],
              'trigger_workflow_path': producer['workflow_path'],
              'trigger_workflow_blob_sha': producer['workflow_blob_sha'],
              'trigger_workflow_run_id': producer['workflow_run_id'],
              'trigger_workflow_run_attempt': producer['workflow_run_attempt'],
              'runner_class': 'github-hosted',
          }
          policy = {
              'repository': os.environ['GITHUB_REPOSITORY'],
              'signer_workflow': f"{os.environ['GITHUB_REPOSITORY']}/.github/workflows/evoguard-produce-release-source-receipt.yml",
              'signer_digest': os.environ['TARGET_SHA'],
              'source_ref': 'refs/heads/main',
              'source_digest': os.environ['TARGET_SHA'],
              'cert_oidc_issuer': 'https://token.actions.githubusercontent.com',
          }
          for path, payload in ((admitter_path, admitter), (policy_path, policy)):
              with open(path, 'w', encoding='utf-8', newline='\n') as output:
                  json.dump(payload, output, sort_keys=True, separators=(',', ':'))
                  output.write('\n')
          PY
          cmp "$INPUTS/admitter.json" "$RUNNER_TEMP/admitter.json"
          cmp "$INPUTS/github-policy.json" "$RUNNER_TEMP/github-policy.json"

      - name: Create dedicated provider identity and root-owned trust material
        env:
          PROVIDER_UID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_UID }}
          PROVIDER_GID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_GID }}
          V2_PRIVATE_KEY_B64: ${{ secrets.EVOGUARD_RELEASE_SOURCE_ADMISSION_V2_PRIVATE_KEY_B64 }}
          V2_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_RELEASE_SOURCE_ADMISSION_V2_PUBLIC_KEY_B64 }}
          FINALIZER_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_TRUSTED_FINALIZER_PUBLIC_KEY_B64 }}
          ARTIFACT_V1_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_ARTIFACT_ADMISSION_V1_PUBLIC_KEY_B64 }}
          ARTIFACT_V2_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_ARTIFACT_DIGEST_ADMISSION_V2_PUBLIC_KEY_B64 }}
          SOURCE_V1_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_RELEASE_SOURCE_FINALIZER_V1_PUBLIC_KEY_B64 }}
        run: |
          set -euo pipefail
          [[ "$PROVIDER_UID" =~ ^[1-9][0-9]*$ ]]
          [[ "$PROVIDER_GID" =~ ^[1-9][0-9]*$ ]]
          test "$PROVIDER_UID" -ne 65534
          test "$PROVIDER_GID" -ne 65534
          sudo groupadd --gid "$PROVIDER_GID" evoguard-provider
          sudo useradd --uid "$PROVIDER_UID" --gid "$PROVIDER_GID" --no-create-home --no-user-group --shell /usr/sbin/nologin evoguard-provider
          test "$(id -u evoguard-provider)" = "$PROVIDER_UID"
          test "$(id -g evoguard-provider)" = "$PROVIDER_GID"
          test "$(id -G evoguard-provider)" = "$PROVIDER_GID"

          sudo install -d -m 0755 -o root -g root /run/evoguard-v2 /run/evoguard-v2/trust
          sudo install -d -m 0700 -o root -g root /run/evoguard-v2/signing
          install_public() {
            local value="$1" destination="$2"
            test -n "$value"
            printf '%s' "$value" | sudo sh -c 'umask 022; base64 --decode > "$1"; chown root:root "$1"; chmod 0644 "$1"' _ "$destination"
          }
          install_public "$V2_PUBLIC_KEY_B64" /run/evoguard-v2/trust/release-source-admission-v2.pub.pem
          install_public "$FINALIZER_PUBLIC_KEY_B64" /run/evoguard-v2/trust/trusted-finalizer.pub.pem
          install_public "$ARTIFACT_V1_PUBLIC_KEY_B64" /run/evoguard-v2/trust/artifact-admission-v1.pub.pem
          install_public "$ARTIFACT_V2_PUBLIC_KEY_B64" /run/evoguard-v2/trust/artifact-digest-admission-v2.pub.pem
          install_public "$SOURCE_V1_PUBLIC_KEY_B64" /run/evoguard-v2/trust/release-source-finalizer-v1.pub.pem
          manifest="$RUNNER_TEMP/external-controls-safe/control-manifest.json"
          for binding in \
            release_source_admission_v2:/run/evoguard-v2/trust/release-source-admission-v2.pub.pem \
            trusted_finalizer:/run/evoguard-v2/trust/trusted-finalizer.pub.pem \
            artifact_admission_v1:/run/evoguard-v2/trust/artifact-admission-v1.pub.pem \
            artifact_digest_admission_v2:/run/evoguard-v2/trust/artifact-digest-admission-v2.pub.pem \
            release_source_finalizer_v1:/run/evoguard-v2/trust/release-source-finalizer-v1.pub.pem; do
            domain="${binding%%:*}"
            key_path="${binding#*:}"
            actual="sha256:$(openssl pkey -pubin -in "$key_path" -outform DER | sha256sum | cut -d' ' -f1)"
            expected="$(jq -r --arg domain "$domain" '.public_key_ids[$domain]' "$manifest")"
            test "$actual" = "$expected"
          done
          test -n "$V2_PRIVATE_KEY_B64"
          printf '%s' "$V2_PRIVATE_KEY_B64" | sudo sh -c 'umask 077; base64 --decode > "$1"; chown root:root "$1"; chmod 0600 "$1"' _ /run/evoguard-v2/signing/release-source-admission-v2.private.pem
          command -v setpriv >/dev/null
          if command -v getfacl >/dev/null; then
            sudo getfacl --absolute-names /run/evoguard-v2 /run/evoguard-v2/signing /run/evoguard-v2/signing/release-source-admission-v2.private.pem
          fi
          if sudo setpriv --reuid="$PROVIDER_UID" --regid="$PROVIDER_GID" --clear-groups \
            test -r /run/evoguard-v2/signing/release-source-admission-v2.private.pem; then
            echo "dedicated provider identity can read the V2 signing key" >&2
            exit 1
          fi

      - name: Freshly verify B as the dedicated provider identity and seal V2 ALLOW
        env:
          INPUTS: ${{ runner.temp }}/external-controls-safe
          BOOTSTRAP_SHA256: ${{ vars.EVOGUARD_BOOTSTRAP_RUNTIME_SHA256 }}
          EXPECTED_GIT_SHA256: ${{ vars.EVOGUARD_GIT_EXECUTABLE_SHA256 }}
          EXPECTED_GH_SHA256: ${{ vars.EVOGUARD_GH_EXECUTABLE_SHA256 }}
          PROVIDER_UID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_UID }}
          PROVIDER_GID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_GID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git_executable="$(cat "$RUNNER_TEMP/git-executable.path")"
          gh_executable="$(cat "$RUNNER_TEMP/gh-executable.path")"
          python_executable="$(readlink -f "$(command -v python3)")"
          sudo --preserve-env=GH_TOKEN,GITHUB_ACTIONS,GITHUB_REPOSITORY,GITHUB_REPOSITORY_ID,GITHUB_RUN_ID,GITHUB_RUN_ATTEMPT,GITHUB_EVENT_NAME,GITHUB_EVENT_PATH,GITHUB_REF,GITHUB_SHA,GITHUB_WORKFLOW_REF,GITHUB_WORKFLOW_SHA,RUNNER_ENVIRONMENT,RUNNER_TEMP \
            "$python_executable" -I "$RUNNER_TEMP/evo-guard.pyz" seal-release-source-admission \
            "$INPUTS/producer-receipt.json" "$INPUTS/handoff.json" "$INPUTS/verdict.json" \
            --out "$RUNNER_TEMP/source-allow.rsae" \
            --source "$INPUTS/source.json" --context "$INPUTS/context.json" \
            --producer "$INPUTS/producer.json" --admitter "$RUNNER_TEMP/admitter.json" \
            --bootstrap-guard-sha "$BOOTSTRAP_SHA256" \
            --github-policy "$RUNNER_TEMP/github-policy.json" \
            --git-repository "$RUNNER_TEMP/objects.git" --git-repository-bare \
            --git-executable "$git_executable" --git-executable-sha256 "$EXPECTED_GIT_SHA256" \
            --github-receipt-out "$RUNNER_TEMP/fresh-provider-receipt.json" \
            --github-raw-output-out "$RUNNER_TEMP/fresh-provider-output.json" \
            --gh-executable "$gh_executable" --gh-executable-sha256 "$EXPECTED_GH_SHA256" \
            --provider-isolation-uid "$PROVIDER_UID" --provider-isolation-gid "$PROVIDER_GID" \
            --sign-key /run/evoguard-v2/signing/release-source-admission-v2.private.pem \
            --sign-pub /run/evoguard-v2/trust/release-source-admission-v2.pub.pem \
            --trusted-finalizer-pub /run/evoguard-v2/trust/trusted-finalizer.pub.pem \
            --artifact-admission-v1-pub /run/evoguard-v2/trust/artifact-admission-v1.pub.pem \
            --artifact-digest-admission-v2-pub /run/evoguard-v2/trust/artifact-digest-admission-v2.pub.pem \
            --release-source-finalizer-v1-pub /run/evoguard-v2/trust/release-source-finalizer-v1.pub.pem \
            | tee "$RUNNER_TEMP/seal-result.json" >/dev/null
          test "$(jq -r .status "$RUNNER_TEMP/seal-result.json")" = "SEALED"
          test "$(jq -r .decision "$RUNNER_TEMP/seal-result.json")" = "ALLOW"

      - name: Upload only the sealed envelope and public result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evoguard-release-source-admission-v2-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/source-allow.rsae
            ${{ runner.temp }}/seal-result.json
          if-no-files-found: error
          overwrite: false
          retention-days: 30

      - name: Remove protected signing material
        if: always()
        run: sudo rm -rf -- /run/evoguard-v2

  detached-verify:
    needs: [preflight, seal]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    steps:
      - name: Set up the detached verifier Python runtime
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Download the exact sealed envelope from this C attempt
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: evoguard-release-source-admission-v2-${{ github.run_attempt }}
          path: ${{ runner.temp }}/admission

      - name: Download the exact pre-Environment external controls
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: evoguard-release-source-v2-controls-${{ github.run_attempt }}
          path: ${{ runner.temp }}/external-controls

      - name: Verify external-control material hashes and install signing verifier
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP/external-controls" <<'PY'
          import hashlib, json, sys
          from pathlib import Path

          root = Path(sys.argv[1])
          manifest = json.loads((root / 'control-manifest.json').read_text(encoding='utf-8'))
          if manifest.get('format') != 'EVOGUARD_RELEASE_SOURCE_V2_EXTERNAL_CONTROLS_V1':
              raise SystemExit('unsupported external-control manifest')
          expected = set(manifest.get('materials', {})) | {'control-manifest.json'}
          if {path.name for path in root.iterdir()} != expected:
              raise SystemExit('external-control file set is not canonical')
          for name, descriptor in manifest['materials'].items():
              data = (root / name).read_bytes()
              if descriptor != {'sha256': hashlib.sha256(data).hexdigest(), 'size': len(data)}:
                  raise SystemExit(f'external-control hash mismatch: {name}')
          PY
          python -m pip install --disable-pip-version-check --only-binary=:all: \
            --require-hashes -r "$RUNNER_TEMP/external-controls/signing-requirements.lock"

      - name: Download and pin the detached verifier runtime
        env:
          BOOTSTRAP_URL: ${{ vars.EVOGUARD_BOOTSTRAP_RUNTIME_URL }}
          BOOTSTRAP_SHA256: ${{ vars.EVOGUARD_BOOTSTRAP_RUNTIME_SHA256 }}
        run: |
          set -euo pipefail
          test -n "$BOOTSTRAP_URL"
          [[ "$BOOTSTRAP_SHA256" =~ ^[0-9a-f]{64}$ ]]
          curl --fail --location --proto '=https' --tlsv1.2 --output "$RUNNER_TEMP/evo-guard.pyz" "$BOOTSTRAP_URL"
          printf '%s  %s\n' "$BOOTSTRAP_SHA256" "$RUNNER_TEMP/evo-guard.pyz" | sha256sum --check

      - name: Decode and bind external public trust roots
        env:
          V2_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_RELEASE_SOURCE_ADMISSION_V2_PUBLIC_KEY_B64 }}
          FINALIZER_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_TRUSTED_FINALIZER_PUBLIC_KEY_B64 }}
          ARTIFACT_V1_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_ARTIFACT_ADMISSION_V1_PUBLIC_KEY_B64 }}
          ARTIFACT_V2_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_ARTIFACT_DIGEST_ADMISSION_V2_PUBLIC_KEY_B64 }}
          SOURCE_V1_PUBLIC_KEY_B64: ${{ vars.EVOGUARD_RELEASE_SOURCE_FINALIZER_V1_PUBLIC_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -m 0700 "$RUNNER_TEMP/trust"
          printf '%s' "$V2_PUBLIC_KEY_B64" | base64 --decode > "$RUNNER_TEMP/trust/release-source-admission-v2.pub.pem"
          printf '%s' "$FINALIZER_PUBLIC_KEY_B64" | base64 --decode > "$RUNNER_TEMP/trust/trusted-finalizer.pub.pem"
          printf '%s' "$ARTIFACT_V1_PUBLIC_KEY_B64" | base64 --decode > "$RUNNER_TEMP/trust/artifact-admission-v1.pub.pem"
          printf '%s' "$ARTIFACT_V2_PUBLIC_KEY_B64" | base64 --decode > "$RUNNER_TEMP/trust/artifact-digest-admission-v2.pub.pem"
          printf '%s' "$SOURCE_V1_PUBLIC_KEY_B64" | base64 --decode > "$RUNNER_TEMP/trust/release-source-finalizer-v1.pub.pem"
          manifest="$RUNNER_TEMP/external-controls/control-manifest.json"
          for binding in \
            release_source_admission_v2:$RUNNER_TEMP/trust/release-source-admission-v2.pub.pem \
            trusted_finalizer:$RUNNER_TEMP/trust/trusted-finalizer.pub.pem \
            artifact_admission_v1:$RUNNER_TEMP/trust/artifact-admission-v1.pub.pem \
            artifact_digest_admission_v2:$RUNNER_TEMP/trust/artifact-digest-admission-v2.pub.pem \
            release_source_finalizer_v1:$RUNNER_TEMP/trust/release-source-finalizer-v1.pub.pem; do
            domain="${binding%%:*}"
            key_path="${binding#*:}"
            actual="sha256:$(openssl pkey -pubin -in "$key_path" -outform DER | sha256sum | cut -d' ' -f1)"
            expected="$(jq -r --arg domain "$domain" '.public_key_ids[$domain]' "$manifest")"
            test "$actual" = "$expected"
          done

      - name: Verify the V2 envelope without Environment, private key, or fresh provider call
        env:
          INPUTS: ${{ runner.temp }}/external-controls
          BOOTSTRAP_SHA256: ${{ vars.EVOGUARD_BOOTSTRAP_RUNTIME_SHA256 }}
          EXPECTED_GIT_SHA256: ${{ vars.EVOGUARD_GIT_EXECUTABLE_SHA256 }}
          EXPECTED_GH_SHA256: ${{ vars.EVOGUARD_GH_EXECUTABLE_SHA256 }}
          PROVIDER_UID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_UID }}
          PROVIDER_GID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_GID }}
        run: |
          set -euo pipefail
          python -I "$RUNNER_TEMP/evo-guard.pyz" verify-release-source-admission \
            "$RUNNER_TEMP/admission/source-allow.rsae" \
            --trusted-pub "$RUNNER_TEMP/trust/release-source-admission-v2.pub.pem" \
            --expected-source "$INPUTS/source.json" --expected-context "$INPUTS/context.json" \
            --expected-producer "$INPUTS/producer.json" --expected-admitter "$INPUTS/admitter.json" \
            --expected-bootstrap-guard-sha "$BOOTSTRAP_SHA256" \
            --expected-github-policy "$INPUTS/github-policy.json" \
            --expected-git-executable-sha256 "$EXPECTED_GIT_SHA256" \
            --expected-gh-executable-sha256 "$EXPECTED_GH_SHA256" \
            --expected-provider-isolation-uid "$PROVIDER_UID" \
            --expected-provider-isolation-gid "$PROVIDER_GID" \
            --trusted-finalizer-pub "$RUNNER_TEMP/trust/trusted-finalizer.pub.pem" \
            --artifact-admission-v1-pub "$RUNNER_TEMP/trust/artifact-admission-v1.pub.pem" \
            --artifact-digest-admission-v2-pub "$RUNNER_TEMP/trust/artifact-digest-admission-v2.pub.pem" \
            --release-source-finalizer-v1-pub "$RUNNER_TEMP/trust/release-source-finalizer-v1.pub.pem" \
            > "$RUNNER_TEMP/detached-verification.json"
          test "$(jq -r .status "$RUNNER_TEMP/detached-verification.json")" = "VERIFIED"
          test "$(jq -r .decision "$RUNNER_TEMP/detached-verification.json")" = "ALLOW"

      - name: Prove detached verification rejects mutated bundle and external roots
        env:
          INPUTS: ${{ runner.temp }}/external-controls
          BOOTSTRAP_SHA256: ${{ vars.EVOGUARD_BOOTSTRAP_RUNTIME_SHA256 }}
          EXPECTED_GIT_SHA256: ${{ vars.EVOGUARD_GIT_EXECUTABLE_SHA256 }}
          EXPECTED_GH_SHA256: ${{ vars.EVOGUARD_GH_EXECUTABLE_SHA256 }}
          PROVIDER_UID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_UID }}
          PROVIDER_GID: ${{ vars.EVOGUARD_PROVIDER_ISOLATION_GID }}
        run: |
          set -euo pipefail
          verify_negative() {
            local label="$1" bundle="$2" producer="$3" git_sha="$4" gh_sha="$5" uid="$6" gid="$7"
            local source="$8" context="$9" bootstrap_sha="${10}" policy="${11}" trusted_pub="${12}"
            if python -I "$RUNNER_TEMP/evo-guard.pyz" verify-release-source-admission \
              "$bundle" \
              --trusted-pub "$trusted_pub" \
              --expected-source "$source" --expected-context "$context" \
              --expected-producer "$producer" --expected-admitter "$INPUTS/admitter.json" \
              --expected-bootstrap-guard-sha "$bootstrap_sha" \
              --expected-github-policy "$policy" \
              --expected-git-executable-sha256 "$git_sha" \
              --expected-gh-executable-sha256 "$gh_sha" \
              --expected-provider-isolation-uid "$uid" --expected-provider-isolation-gid "$gid" \
              --trusted-finalizer-pub "$RUNNER_TEMP/trust/trusted-finalizer.pub.pem" \
              --artifact-admission-v1-pub "$RUNNER_TEMP/trust/artifact-admission-v1.pub.pem" \
              --artifact-digest-admission-v2-pub "$RUNNER_TEMP/trust/artifact-digest-admission-v2.pub.pem" \
              --release-source-finalizer-v1-pub "$RUNNER_TEMP/trust/release-source-finalizer-v1.pub.pem" \
              > "$RUNNER_TEMP/negative-$label.stdout" 2> "$RUNNER_TEMP/negative-$label.stderr"; then
              echo "negative case unexpectedly verified: $label" >&2
              exit 1
            fi
          }

          mutate_digest() {
            local value="$1" pattern='^([0-9a-f]{40}|[0-9a-f]{64})$'
            [[ "$value" =~ $pattern ]]
            printf '%s%s\n' "$(test "${value:0:1}" = 0 && printf 1 || printf 0)" "${value:1}"
          }

          defaults=(
            "$RUNNER_TEMP/admission/source-allow.rsae"
            "$INPUTS/producer.json"
            "$EXPECTED_GIT_SHA256"
            "$EXPECTED_GH_SHA256"
            "$PROVIDER_UID"
            "$PROVIDER_GID"
            "$INPUTS/source.json"
            "$INPUTS/context.json"
            "$BOOTSTRAP_SHA256"
            "$INPUTS/github-policy.json"
            "$RUNNER_TEMP/trust/release-source-admission-v2.pub.pem"
          )

          cp "$RUNNER_TEMP/admission/source-allow.rsae" "$RUNNER_TEMP/tampered.rsae"
          python - "$RUNNER_TEMP/tampered.rsae" <<'PY'
          import pathlib, sys
          path = pathlib.Path(sys.argv[1])
          data = bytearray(path.read_bytes())
          data[len(data) // 2] ^= 1
          path.write_bytes(data)
          PY
          tampered=("${defaults[@]}")
          tampered[0]="$RUNNER_TEMP/tampered.rsae"
          verify_negative tampered-bundle "${tampered[@]}"

          wrong_git=("${defaults[@]}")
          wrong_git[2]="$(mutate_digest "$EXPECTED_GIT_SHA256")"
          verify_negative wrong-git-pin "${wrong_git[@]}"

          wrong_gh=("${defaults[@]}")
          wrong_gh[3]="$(mutate_digest "$EXPECTED_GH_SHA256")"
          verify_negative wrong-gh-pin "${wrong_gh[@]}"

          wrong_uid=("${defaults[@]}")
          wrong_uid[4]="$((PROVIDER_UID + 1))"
          verify_negative wrong-provider-uid "${wrong_uid[@]}"

          wrong_gid=("${defaults[@]}")
          wrong_gid[5]="$((PROVIDER_GID + 1))"
          verify_negative wrong-provider-gid "${wrong_gid[@]}"

          python - "$INPUTS/producer.json" "$RUNNER_TEMP/mutated-producer.json" <<'PY'
          import json, sys
          value = json.load(open(sys.argv[1], encoding='utf-8'))
          value['workflow_run_attempt'] += 1
          with open(sys.argv[2], 'w', encoding='utf-8', newline='\n') as output:
              json.dump(value, output, sort_keys=True, separators=(',', ':'))
              output.write('\n')
          PY
          mutated_producer=("${defaults[@]}")
          mutated_producer[1]="$RUNNER_TEMP/mutated-producer.json"
          verify_negative mutated-producer "${mutated_producer[@]}"

          python - "$INPUTS/source.json" "$RUNNER_TEMP/mutated-source.json" <<'PY'
          import json, sys
          value = json.load(open(sys.argv[1], encoding='utf-8'))
          digest = value['target_commit_sha']
          value['target_commit_sha'] = ('0' if digest[0] != '0' else '1') + digest[1:]
          with open(sys.argv[2], 'w', encoding='utf-8', newline='\n') as output:
              json.dump(value, output, sort_keys=True, separators=(',', ':'))
              output.write('\n')
          PY
          mutated_source=("${defaults[@]}")
          mutated_source[6]="$RUNNER_TEMP/mutated-source.json"
          verify_negative mutated-source "${mutated_source[@]}"

          python - "$INPUTS/context.json" "$RUNNER_TEMP/mutated-context.json" <<'PY'
          import json, sys
          value = json.load(open(sys.argv[1], encoding='utf-8'))
          digest = value['target_commit_sha']
          value['target_commit_sha'] = ('0' if digest[0] != '0' else '1') + digest[1:]
          with open(sys.argv[2], 'w', encoding='utf-8', newline='\n') as output:
              json.dump(value, output, sort_keys=True, separators=(',', ':'))
              output.write('\n')
          PY
          mutated_context=("${defaults[@]}")
          mutated_context[7]="$RUNNER_TEMP/mutated-context.json"
          verify_negative mutated-context "${mutated_context[@]}"

          wrong_bootstrap=("${defaults[@]}")
          wrong_bootstrap[8]="$(mutate_digest "$BOOTSTRAP_SHA256")"
          verify_negative wrong-bootstrap-pin "${wrong_bootstrap[@]}"

          python - "$INPUTS/github-policy.json" "$RUNNER_TEMP/mutated-policy.json" <<'PY'
          import json, sys
          value = json.load(open(sys.argv[1], encoding='utf-8'))
          digest = value['signer_digest']
          value['signer_digest'] = ('0' if digest[0] != '0' else '1') + digest[1:]
          with open(sys.argv[2], 'w', encoding='utf-8', newline='\n') as output:
              json.dump(value, output, sort_keys=True, separators=(',', ':'))
              output.write('\n')
          PY
          mutated_policy=("${defaults[@]}")
          mutated_policy[9]="$RUNNER_TEMP/mutated-policy.json"
          verify_negative mutated-policy "${mutated_policy[@]}"

          openssl genpkey -algorithm ED25519 -out "$RUNNER_TEMP/wrong-v2.private.pem"
          openssl pkey -in "$RUNNER_TEMP/wrong-v2.private.pem" -pubout -out "$RUNNER_TEMP/wrong-v2.public.pem"
          rm -f "$RUNNER_TEMP/wrong-v2.private.pem"
          wrong_v2_root=("${defaults[@]}")
          wrong_v2_root[10]="$RUNNER_TEMP/wrong-v2.public.pem"
          verify_negative wrong-v2-root "${wrong_v2_root[@]}"

          printf '%s\n' '{"format":"EVOGUARD_RELEASE_SOURCE_V2_DETACHED_NEGATIVE_V1","mutated_context":"REJECTED","mutated_policy":"REJECTED","mutated_producer":"REJECTED","mutated_source":"REJECTED","tampered_bundle":"REJECTED","wrong_bootstrap_pin":"REJECTED","wrong_gh_pin":"REJECTED","wrong_git_pin":"REJECTED","wrong_provider_gid":"REJECTED","wrong_provider_uid":"REJECTED","wrong_v2_root":"REJECTED"}' > "$RUNNER_TEMP/detached-negative-results.json"

      - name: Preserve the detached verification result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evoguard-release-source-admission-v2-verified-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/detached-verification.json
            ${{ runner.temp }}/detached-negative-results.json
          if-no-files-found: error
          overwrite: false
          retention-days: 30
