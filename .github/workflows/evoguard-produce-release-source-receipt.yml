name: EvoGuard Produce Release Source Receipt

on:
  workflow_run: # zizmor: ignore[dangerous-triggers] reviewed A/B chain; B never checks out or executes candidate source
    workflows: ["EvoGuard Release Source Reverify"]
    types: [completed]

permissions: {}

jobs:
  preflight:
    if: vars.EVOGUARD_RELEASE_SOURCE_V2_ENABLED == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    outputs:
      target_sha: ${{ steps.trigger.outputs.target_sha }}
      trigger_run_id: ${{ steps.trigger.outputs.trigger_run_id }}
      trigger_run_attempt: ${{ steps.trigger.outputs.trigger_run_attempt }}
      trigger_workflow_id: ${{ steps.trigger.outputs.trigger_workflow_id }}
      repository_id: ${{ steps.trigger.outputs.repository_id }}
    steps:
      - id: trigger
        name: Accept only the configured successful source reverify run
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EXPECTED_REVERIFY_WORKFLOW_ID: ${{ vars.EVOGUARD_RELEASE_SOURCE_REVERIFY_WORKFLOW_ID }}
        with:
          script: |
            const run = context.payload.workflow_run;
            const expected = process.env.EXPECTED_REVERIFY_WORKFLOW_ID || '';
            if (!/^[1-9][0-9]*$/.test(expected)) {
              throw new Error('EVOGUARD_RELEASE_SOURCE_REVERIFY_WORKFLOW_ID is not configured');
            }
            if (run.path !== '.github/workflows/evoguard-release-source-reverify.yml' ||
                run.event !== 'workflow_dispatch' || run.conclusion !== 'success' ||
                run.head_branch !== 'main' || run.head_repository?.full_name !== context.payload.repository.full_name ||
                String(run.workflow_id) !== expected || !/^[0-9a-f]{40,64}$/.test(run.head_sha)) {
              throw new Error('trigger is not the configured successful protected-main reverify run');
            }
            const { owner, repo } = context.repo;
            const current = (await github.rest.repos.getBranch({ owner, repo, branch: 'main' })).data.commit.sha;
            if (current !== run.head_sha || context.sha !== run.head_sha) {
              throw new Error('protected main changed after reverify; refuse receipt production');
            }
            core.setOutput('target_sha', run.head_sha);
            core.setOutput('trigger_run_id', String(run.id));
            core.setOutput('trigger_run_attempt', String(run.run_attempt));
            core.setOutput('trigger_workflow_id', String(run.workflow_id));
            core.setOutput('repository_id', String(context.payload.repository.id));

  receipt:
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download exactly the triggering reverify evidence attempt
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: evoguard-release-source-evidence-v2-${{ needs.preflight.outputs.trigger_run_attempt }}
          path: ${{ runner.temp }}/reverify-evidence
          run-id: ${{ needs.preflight.outputs.trigger_run_id }}
          github-token: ${{ github.token }}

      - name: Snapshot only regular bounded reverify inputs before reading them
        env:
          INPUTS: ${{ runner.temp }}/reverify-evidence
          SNAPSHOT: ${{ runner.temp }}/reverify-inputs
        run: |
          set -euo pipefail
          python - "$INPUTS" "$SNAPSHOT" <<'PY'
          import os, stat, sys

          source, destination = map(os.path.abspath, sys.argv[1:])
          expected = {
              'source.json': 128 * 1024,
              'context.json': 256 * 1024,
              'verdict.json': 8 * 1024 * 1024,
              'handoff.json': 512 * 1024,
          }
          metadata = os.lstat(source)
          if stat.S_ISLNK(metadata.st_mode) or not stat.S_ISDIR(metadata.st_mode):
              raise SystemExit('downloaded evidence root must be a real directory')
          if set(os.listdir(source)) != set(expected):
              raise SystemExit('downloaded evidence has an unexpected file set')
          os.mkdir(destination, 0o700)
          flags = os.O_RDONLY | getattr(os, 'O_NOFOLLOW', 0)
          for name, maximum in expected.items():
              path = os.path.join(source, name)
              before = os.lstat(path)
              if stat.S_ISLNK(before.st_mode) or not stat.S_ISREG(before.st_mode):
                  raise SystemExit(f'{name} must be a regular non-symlink file')
              if before.st_size < 1 or before.st_size > maximum:
                  raise SystemExit(f'{name} is outside its bounded size')
              descriptor = os.open(path, flags)
              try:
                  opened = os.fstat(descriptor)
                  if not stat.S_ISREG(opened.st_mode) or (opened.st_dev, opened.st_ino) != (before.st_dev, before.st_ino):
                      raise SystemExit(f'{name} changed while it was opened')
                  target = os.path.join(destination, name)
                  output = os.open(target, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
                  try:
                      with os.fdopen(descriptor, 'rb', closefd=False) as reader, os.fdopen(output, 'wb', closefd=False) as writer:
                          while True:
                              chunk = reader.read(1024 * 1024)
                              if not chunk:
                                  break
                              writer.write(chunk)
                          writer.flush()
                          os.fsync(writer.fileno())
                  finally:
                      os.close(output)
                  after = os.fstat(descriptor)
                  if (after.st_dev, after.st_ino, after.st_size, after.st_mtime_ns) != (opened.st_dev, opened.st_ino, opened.st_size, opened.st_mtime_ns):
                      raise SystemExit(f'{name} changed while it was copied')
                  if os.stat(target).st_size != opened.st_size:
                      raise SystemExit(f'{name} copy size mismatch')
              finally:
                  os.close(descriptor)
          PY

      - name: Download and pin the receipt-capable prior Guard runtime
        env:
          BOOTSTRAP_URL: ${{ vars.EVOGUARD_BOOTSTRAP_RUNTIME_URL }}
          BOOTSTRAP_SHA256: ${{ vars.EVOGUARD_BOOTSTRAP_RUNTIME_SHA256 }}
        run: |
          set -euo pipefail
          test -n "$BOOTSTRAP_URL"
          [[ "$BOOTSTRAP_SHA256" =~ ^[0-9a-f]{64}$ ]]
          curl --fail --location --proto '=https' --tlsv1.2 --output "$RUNNER_TEMP/evo-guard.pyz" "$BOOTSTRAP_URL"
          printf '%s  %s\n' "$BOOTSTRAP_SHA256" "$RUNNER_TEMP/evo-guard.pyz" | sha256sum --check
          chmod 0755 "$RUNNER_TEMP/evo-guard.pyz"

      - name: Re-derive protected-main controls without candidate execution
        env:
          EVIDENCE: ${{ runner.temp }}/reverify-inputs
          TARGET_SHA: ${{ needs.preflight.outputs.target_sha }}
        run: |
          set -euo pipefail
          objects="$RUNNER_TEMP/objects.git"
          git init --bare "$objects"
          git -C "$objects" remote add origin "https://github.com/$GITHUB_REPOSITORY.git"
          GIT_TERMINAL_PROMPT=0 git -C "$objects" fetch --quiet --no-tags origin "+refs/heads/main:refs/heads/main"
          test "$(git -C "$objects" rev-parse refs/heads/main)" = "$TARGET_SHA"
          python -I "$RUNNER_TEMP/evo-guard.pyz" derive-release-source-controls \
            "$EVIDENCE/verdict.json" --source "$EVIDENCE/source.json" \
            --git-repository "$objects" --git-repository-bare \
            --source-out "$RUNNER_TEMP/source.json" --context-out "$RUNNER_TEMP/context.json"
          cmp "$EVIDENCE/source.json" "$RUNNER_TEMP/source.json"
          cmp "$EVIDENCE/context.json" "$RUNNER_TEMP/context.json"
          cp "$EVIDENCE/verdict.json" "$RUNNER_TEMP/verdict.json"
          cp "$EVIDENCE/handoff.json" "$RUNNER_TEMP/handoff.json"

      - name: Create canonical producer claim bound to this workflow_run
        env:
          TARGET_SHA: ${{ needs.preflight.outputs.target_sha }}
          REPOSITORY_ID: ${{ needs.preflight.outputs.repository_id }}
          TRIGGER_WORKFLOW_ID: ${{ needs.preflight.outputs.trigger_workflow_id }}
          TRIGGER_RUN_ID: ${{ needs.preflight.outputs.trigger_run_id }}
          TRIGGER_RUN_ATTEMPT: ${{ needs.preflight.outputs.trigger_run_attempt }}
          RECEIPT_WORKFLOW_ID: ${{ vars.EVOGUARD_RELEASE_SOURCE_RECEIPT_WORKFLOW_ID }}
          EXPECTED_REVERIFY_WORKFLOW_BLOB_SHA: ${{ vars.EVOGUARD_RELEASE_SOURCE_REVERIFY_WORKFLOW_BLOB_SHA }}
          EXPECTED_RECEIPT_WORKFLOW_BLOB_SHA: ${{ vars.EVOGUARD_RELEASE_SOURCE_RECEIPT_WORKFLOW_BLOB_SHA }}
          BOOTSTRAP_SHA256: ${{ vars.EVOGUARD_BOOTSTRAP_RUNTIME_SHA256 }}
        run: |
          set -euo pipefail
          [[ "$RECEIPT_WORKFLOW_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$EXPECTED_REVERIFY_WORKFLOW_BLOB_SHA" =~ ^[0-9a-f]{40,64}$ ]]
          [[ "$EXPECTED_RECEIPT_WORKFLOW_BLOB_SHA" =~ ^[0-9a-f]{40,64}$ ]]
          test "$GITHUB_SHA" = "$TARGET_SHA"
          objects="$RUNNER_TEMP/objects.git"
          workflow_blob="$(git -C "$objects" rev-parse "$TARGET_SHA:.github/workflows/evoguard-produce-release-source-receipt.yml")"
          trigger_workflow_blob="$(git -C "$objects" rev-parse "$TARGET_SHA:.github/workflows/evoguard-release-source-reverify.yml")"
          test "$workflow_blob" = "$EXPECTED_RECEIPT_WORKFLOW_BLOB_SHA"
          test "$trigger_workflow_blob" = "$EXPECTED_REVERIFY_WORKFLOW_BLOB_SHA"
          WORKFLOW_BLOB="$workflow_blob" TRIGGER_WORKFLOW_BLOB="$trigger_workflow_blob" python - "$RUNNER_TEMP/producer.json" <<'PY'
          import json, os, re, sys

          values = {name: os.environ[name] for name in (
              'GITHUB_REPOSITORY', 'REPOSITORY_ID', 'RECEIPT_WORKFLOW_ID', 'WORKFLOW_BLOB',
              'GITHUB_RUN_ID', 'GITHUB_RUN_ATTEMPT', 'TARGET_SHA', 'TRIGGER_WORKFLOW_ID',
              'TRIGGER_WORKFLOW_BLOB', 'TRIGGER_RUN_ID', 'TRIGGER_RUN_ATTEMPT',
          )}
          values['workflow_blob'] = values.pop('WORKFLOW_BLOB')
          values['trigger_workflow_blob'] = values.pop('TRIGGER_WORKFLOW_BLOB')
          for key in ('REPOSITORY_ID', 'RECEIPT_WORKFLOW_ID', 'GITHUB_RUN_ID', 'GITHUB_RUN_ATTEMPT',
                      'TRIGGER_WORKFLOW_ID', 'TRIGGER_RUN_ID', 'TRIGGER_RUN_ATTEMPT'):
              if re.fullmatch(r'[1-9][0-9]*', values[key]) is None:
                  raise SystemExit(f'invalid {key}')
          if any(re.fullmatch(r'[0-9a-f]{40,64}', values[key]) is None
                 for key in ('TARGET_SHA', 'workflow_blob', 'trigger_workflow_blob')):
              raise SystemExit('invalid immutable Git digest')
          payload = {
              'workflow_repository': values['GITHUB_REPOSITORY'],
              'workflow_repository_id': values['REPOSITORY_ID'],
              'workflow_id': values['RECEIPT_WORKFLOW_ID'],
              'workflow_path': '.github/workflows/evoguard-produce-release-source-receipt.yml',
              'workflow_blob_sha': values['workflow_blob'],
              'workflow_run_id': values['GITHUB_RUN_ID'],
              'workflow_run_attempt': int(values['GITHUB_RUN_ATTEMPT']),
              'workflow_event': 'workflow_run',
              'workflow_ref': 'refs/heads/main',
              'workflow_commit_sha': values['TARGET_SHA'],
              'trigger_workflow_id': values['TRIGGER_WORKFLOW_ID'],
              'trigger_workflow_path': '.github/workflows/evoguard-release-source-reverify.yml',
              'trigger_workflow_blob_sha': values['trigger_workflow_blob'],
              'trigger_workflow_run_id': values['TRIGGER_RUN_ID'],
              'trigger_workflow_run_attempt': int(values['TRIGGER_RUN_ATTEMPT']),
              'runner_class': 'github-hosted',
          }
          with open(sys.argv[1], 'w', encoding='utf-8', newline='\n') as output:
              json.dump(payload, output, sort_keys=True, separators=(',', ':'))
              output.write('\n')
          PY
          python -I "$RUNNER_TEMP/evo-guard.pyz" create-release-source-producer-receipt \
            "$RUNNER_TEMP/verdict.json" "$RUNNER_TEMP/handoff.json" --out "$RUNNER_TEMP/producer-receipt.json" \
            --source "$RUNNER_TEMP/source.json" --context "$RUNNER_TEMP/context.json" \
            --producer "$RUNNER_TEMP/producer.json" --bootstrap-guard-sha "$BOOTSTRAP_SHA256" \
            --git-repository "$objects" --git-repository-bare

      - name: Generate GitHub provenance for the exact receipt bytes
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ runner.temp }}/producer-receipt.json

      - name: Preserve the receipt input set as data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evoguard-release-source-producer-receipt-v2-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/source.json
            ${{ runner.temp }}/context.json
            ${{ runner.temp }}/verdict.json
            ${{ runner.temp }}/handoff.json
            ${{ runner.temp }}/producer.json
            ${{ runner.temp }}/producer-receipt.json
          if-no-files-found: error
          overwrite: false
          retention-days: 7
